  reasoning_effort: medium
  verbose: false
browser:
  inactivity_timeout: 120
code_execution:
  max_tool_calls: 50
  timeout: 300
compression:
  enabled: true
  protect_last_n: 20
  summary_model: google/gemini-3-flash-preview
  target_ratio: 0.2
  threshold: 0.5
delegation:
  model: anthropic/claude-sonnet-4-6    # Default subagent model
  provider: anthropic                    # Use Anthropic directly (not OpenRouter) for reliability
  default_toolsets:
  - terminal
  - file
  - web
  max_iterations: 50
fallback_model:
  provider: anthropic
  model: anthropic/claude-opus-4-6      # Fallback when primary fails
smart_model_routing:
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
  cheap_model:
    provider: openrouter
    model: google/gemini-2.5-flash      # Simple tasks use cheap model
display:
  background_process_notifications: all
  bell_on_complete: false
  busy_input_mode: interrupt
  compact: false
  show_reasoning: false
  skin: default
  streaming: true
  tool_progress: all
group_sessions_per_user: true
mcp_servers: {}
  # pi_coding_agent DISABLED — using Pi via CLI instead (process isolation, no worker crash)
  # To re-enable, uncomment below:
  # pi_coding_agent:
  #   args:
  #   - /home/bob/.hermes/mcp-servers/pi-agent/index.mjs
  #   command: /home/bob/.nvm/versions/node/v22.22.2/bin/node
  #   connect_timeout: 30
  #   env:
  #     NODE_PATH: /home/bob/.hermes/mcp-servers/pi-agent/node_modules
  #     PI_CWD: /home/bob
  #   timeout: 300
memory:
  flush_min_turns: 6
  memory_char_limit: 2200
  memory_enabled: true
  nudge_interval: 10
  user_char_limit: 1375
  user_profile_enabled: true
model:
  default: claude-sonnet-4-6
  provider: anthropic
platform_toolsets:
  cli:
  - hermes-cli
  discord:
  - hermes-discord
  homeassistant:
  - hermes-homeassistant
  signal:
  - hermes-signal
  slack:
  - hermes-slack
  telegram:
  - hermes-telegram
  whatsapp:
  - hermes-whatsapp
session_reset:
  at_hour: 4
  idle_minutes: 1440
  mode: both
skills:
  creation_nudge_interval: 15
smart_model_routing:
  cheap_model:
    model: google/gemini-2.5-flash
    provider: openrouter
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
streaming:
  enabled: false
stt:
  enabled: true
  model: whisper-1
terminal:
  backend: local
  container_cpu: 1
  container_disk: 51200
  container_memory: 5120
  container_persistent: true
  cwd: .
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
  timeout: 1800
